app = "opseua-deploy"
primary_region = "gru"

[build]

# frps túnel - TCP puro (correto, não mexer)
[[services]]
internal_port = 7000
protocol = "tcp"
[[services.ports]]
port = 7000

# frps dashboard - precisa de handler http
[[services]]
internal_port = 7500
protocol = "tcp"
[[services.ports]]
port = 7500
handlers = ["http"]

# WebSocket / comunicação
[[services]]
internal_port = 8080
protocol = "tcp"
[[services.ports]]
port = 80
handlers = ["http"]
[[services.ports]]
port = 443
handlers = ["tls", "http"]

# Versionamento
[[services]]
internal_port = 3000
protocol = "tcp"
[[services.ports]]
port = 3000
handlers = ["http"]

[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1
