# CONFIGURAÇÕES
app = "opseua-deploy"
primary_region = "gru"
[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1

[build]

###################################################### frps
# CONEXÃO ENTRE CLIENTES
[[services]]
internal_port = 7000
protocol = "tcp"
[[services.ports]]
port = 7000

# DASHBOARD
[[services]]
internal_port = 7500
protocol = "tcp"
[[services.ports]]
port = 7500
handlers = ["http"]

###################################################### nats
# CLIENTES AVANÇADOS (Node)
[[services]]
internal_port = 4222
protocol = "tcp"
[[services.ports]]
port = 4222

# CLIENTES AVANÇADOS (Chrome)
[[services]]
internal_port = 8080
protocol = "tcp"
[[services.ports]]
port = 8080

# CLIENTES LEGACY (HTTP / Websocket) [bridge]
[[services]]
internal_port = 9877
protocol = "tcp"
[[services.ports]]
port = 9877

###################################################### versionamento
[[services]]
internal_port = 3000
protocol = "tcp"
[[services.ports]]
port = 3000
handlers = ["http"]
